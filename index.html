<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLens AI - Extraction Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; padding: 2rem; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 2rem; }
        h1 { margin-top: 0; font-size: 1.5rem; color: #111827; }
        .form-group { display: flex; gap: 1rem; align-items: center; margin-top: 1.5rem; }
        input[type="file"] { border: 1px solid #d1d5db; padding: 0.5rem; border-radius: 4px; }
        button { background-color: #2563eb; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 4px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        pre { background: #1f2937; color: #f3f4f6; padding: 1.5rem; border-radius: 6px; overflow-x: auto; font-size: 0.875rem; line-height: 1.5; }
        .loader { display: none; margin-top: 1rem; font-weight: 600; color: #2563eb; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏥 HealthLens AI Pipeline Tester</h1>
        <p>Upload a medical report (PDF/Image) to test the deterministic extraction engine.</p>
        
        <div class="form-group">
            <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png">
            <button id="uploadBtn" onclick="uploadFile()">Extract Data</button>
        </div>
        <div id="loader" class="loader">⏳ Processing document... This may take a few seconds.</div>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <h1>API Response</h1>
        <pre><code id="jsonOutput"></code></pre>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const jsonOutput = document.getElementById('jsonOutput');

            if (!fileInput.files[0]) {
                alert("Please select a file first.");
                return;
            }

            const formData = new FormData();
            formData.append("report", fileInput.files[0]);

            uploadBtn.disabled = true;
            loader.style.display = "block";
            resultCard.style.display = "none";
            jsonOutput.textContent = "";

            try {
                const response = await fetch('http://localhost:5000/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                jsonOutput.textContent = JSON.stringify(data, null, 2);
                resultCard.style.display = "block";
            } catch (error) {
                jsonOutput.textContent = "Error: " + error.message;
                resultCard.style.display = "block";
            } finally {
                uploadBtn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
